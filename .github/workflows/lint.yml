# goal of the workflow
# whenever someone changes the python code, the linter will check if the sytax, format,indentation is correct or not

name: Auto Python Linter

on:
  push:
    # branches:
    paths: "*.py"

jobs:
  code:
    runs-on: ubuntu-latest
    steps:
      # this step will automatically clone the code of the current branch into the runner
      - name: Checkout/Clone the code
        uses: actions/checkout@v7 # using predefined action instead of manually writing commands to clone the repository into the runner

      # This install ruff linter for python
      - name: Install Linter
        run: pip install ruff

      # - name: Check Linting
      #   run: ruff
        
