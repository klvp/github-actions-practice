name: CICD

on:
  workflow_dispatch:

jobs:
  code:
    runs-on: ubuntu-latest
    steps:
      - name: Clone the Code
        run:  echo "Cloning the Code"
  build:
    needs: [code]
    runs-on: ubuntu-latest
    steps:
      - name: Build using Docker
        run:  echo "Build using Docker"

  test:
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - name: Running Test cases
        run:  echo "Running Test cases"

  deploy:
    needs: [build,test]
    runs-on: ubuntu-latest
    steps:
      - name: Deploying code on the server
        run:  echo "Deploying code on the server"
